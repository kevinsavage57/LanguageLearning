<!DOCTYPE html>
<html>
<head>
  <title>Language Learning Game</title>
  <link rel="stylesheet" href="style.css">

  <!-- PWA: makes the app installable -->
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <meta name="theme-color" content="#ffffff">
  <link rel="manifest" href="manifest.json">
  <link rel="apple-touch-icon" href="icon-192.png">
</head>
<body>
<div id="inlineJsMarker" style="display:none;"></div>

  <header class="top">
    <h1 id="appTitle">Vocabulary Matching</h1>

    <div class="controls">
      <select id="mode">
        <option value="all">Matching</option>
        <option value="review">Review Only</option>
        <option value="typing">Typing Game</option>
        <option value="verb-match" disabled id="verbMatchOption">Verb Matching</option>
        <option value="verb-type" disabled id="verbTypeOption">Verb Typing</option>
      </select>

      <select id="level">
        <option value="all">All Levels</option>
        <option value="verbs">Verbs Only</option>
        <option value="A1">A1</option>
        <option value="A2">A2</option>
        <option value="B1">B1</option>
        <option value="B2">B2</option>
      </select>

      <select id="langSelect" title="Language">
        <option value="es">🇪🇸 Spanish</option>
        <option value="it">🇮🇹 Italian</option>
      </select>

      <a href="javascript:void(0)" onclick="window.open('help.html','_blank')" id="directionsBtn" title="How to play" style="
        display:inline-flex; align-items:center; gap:5px;
        padding:6px 14px;
        background:#f5f5f5; border:1px solid #ccc; border-radius:6px;
        color:#333; font-size:13px; font-weight:500;
        text-decoration:none; cursor:pointer;
        white-space:nowrap;
        transition:background 0.15s, border-color 0.15s;
      "
      onmouseover="this.style.background='#e8e8e8'; this.style.borderColor='#aaa';"
      onmouseout="this.style.background='#f5f5f5'; this.style.borderColor='#ccc';"
      >
        <svg width="14" height="14" viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round">
          <circle cx="8" cy="8" r="7"/>
          <path d="M8 7v5M8 5v.5"/>
        </svg>
        Directions
      </a>
    </div>
  </header>

  <div class="content">
    <aside class="sidebar">
      <div id="stats"></div>
      <div id="mastery"></div>
    </aside>

    <main class="gameArea">

      <div class="game">
        <div id="sourceCol" class="column"></div>
        <div id="targetCol" class="column"></div>
      </div>

      <div id="typingArea" class="typing" style="display:none;">
        <div id="prompt"></div>
        <input id="translationInput" type="text" autocomplete="off" autocorrect="off" autocapitalize="off" spellcheck="false">

        <div id="accentButtons" class="accent-buttons"></div>

        <button id="submitTranslation">Submit</button>
        <div id="feedback"></div>
        <button id="continueBtn" style="display:none;">Continue</button>
      </div>

    </main>
  </div>

  <script type="module" src="app_main.js"></script>

<script>
  window.addEventListener("DOMContentLoaded", () => {
    const sel = document.getElementById("langSelect");
    if (sel) {
      const current = new URLSearchParams(window.location.search).get("lang") || "es";
      sel.value = current;
      sel.addEventListener("change", () => {
        const url = new URL(window.location.href);
        url.searchParams.set("lang", sel.value);
        window.location.href = url.toString();
      });
    }
  });

  if ("serviceWorker" in navigator) {
    navigator.serviceWorker.register("./service-worker.js");
  }
</script>

</body>
</html>
