<!DOCTYPE html>
<html>
<head>
  <title>Language Learning Game</title>
  <link rel="stylesheet" href="style.css">

  <!-- PWA: makes the app installable -->
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <meta name="theme-color" content="#ffffff">
  <link rel="manifest" href="manifest.json">
  <link rel="apple-touch-icon" href="icon-192.png">
</head>
<body>
<div id="inlineJsMarker" style="display:none;"></div>

  <header class="top">
    <h1 id="appTitle">Vocabulary Matching</h1>

    <div class="controls">
      <select id="mode">
        <option value="all">Matching</option>
        <option value="review">Review Only</option>
        <option value="typing">Typing Game</option>
        <option value="verb-match" disabled id="verbMatchOption">Verb Matching</option>
        <option value="verb-type" disabled id="verbTypeOption">Verb Typing</option>
      </select>

      <select id="level">
        <option value="all">All Levels</option>
        <option value="verbs">Verbs Only</option>
        <option value="A1">A1</option>
        <option value="A2">A2</option>
        <option value="B1">B1</option>
        <option value="B2">B2</option>
      </select>

      <select id="langSelect" title="Language">
        <option value="es">🇪🇸 Spanish</option>
        <option value="it">🇮🇹 Italian</option>
      </select>
    </div>
  </header>

  <div class="content">
    <aside class="sidebar">
      <div id="stats"></div>
      <div id="mastery"></div>
    </aside>

    <main class="gameArea">

      <div class="game">
        <div id="sourceCol" class="column"></div>
        <div id="targetCol" class="column"></div>
      </div>

      <div id="typingArea" class="typing" style="display:none;">
        <div id="prompt"></div>
        <input id="translationInput" type="text">

        <div id="accentButtons" class="accent-buttons"></div>

        <button id="submitTranslation">Submit</button>
        <div id="feedback"></div>
        <button id="continueBtn" style="display:none;">Continue</button>
      </div>

    </main>
  </div>

  <script type="module" src="app_main.js"></script>

<script>
  window.addEventListener("DOMContentLoaded", () => {
    const sel = document.getElementById("langSelect");
    if (sel) {
      const current = new URLSearchParams(window.location.search).get("lang") || "es";
      sel.value = current;
      sel.addEventListener("change", () => {
        const url = new URL(window.location.href);
        url.searchParams.set("lang", sel.value);
        window.location.href = url.toString();
      });
    }
  });

  if ("serviceWorker" in navigator) {
    navigator.serviceWorker.getRegistrations().then(registrations => {
      for (const reg of registrations) reg.unregister();
    });
  }
</script>

</body>
</html>
